<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣本島即時天氣預報</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="../index.html" class="back-home">⬅ 返回應用總覽</a>

    <div class="weather-container">
        <h2>🌤️ 台灣本島天氣預報</h2>
        
        <div class="search-box">
            <select id="city-select">
                <option value="">-- 請選擇縣市 --</option>
                <option value="Taipei">基隆市/台北市/新北市</option>
                <option value="Taoyuan">桃園市</option>
                <option value="Hsinchu">新竹縣市</option>
                <option value="Miaoli">苗栗縣</option>
                <option value="Taichung">台中市</option>
                <option value="Changhua">彰化縣</option>
                <option value="Nantou">南投縣</option>
                <option value="Yunlin">雲林縣</option>
                <option value="Chiayi">嘉義縣市</option>
                <option value="Tainan">台南市</option>
                <option value="Kaohsiung">高雄市</option>
                <option value="Pingtung">屏東縣</option>
                <option value="Yilan">宜蘭縣</option>
                <option value="Hualien">花蓮縣</option>
                <option value="Taitung">台東縣</option>
            </select>
            <button id="search-btn">查詢</button>
        </div>

        <div id="weather-info" class="weather-info hidden">
            <h3 id="city-name">台北市</h3>
            <div class="weather-status">
                <img id="weather-icon" src="" alt="天氣圖示">
                <span id="weather-desc">多雲時晴</span>
            </div>
            <div class="temp-display">
                <span id="temperature">26</span>°C
            </div>
            <div class="details">
                <div class="col">
                    <p>💧 濕度</p>
                    <p id="humidity">78%</p>
                </div>
                <div class="col">
                    <p>💨 風速</p>
                    <p id="wind-speed">3.6 m/s</p>
                </div>
            </div>
        </div>

        <p id="error-msg" class="error-msg hidden">無法順利取得天氣資料，請稍後再試！</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
